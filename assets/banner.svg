<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="bannerTitle">
  <title id="bannerTitle">SafeStay — Hidden Camera Scanner for short-term rentals</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E0E0E"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="pupilGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#CC1B1B" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#CC1B1B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Surface -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Wordmark + tagline -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
    <text x="80" y="168" font-size="80" font-weight="700" letter-spacing="-2.5" fill="#FAFAFA">SafeStay</text>
    <text x="84" y="206" font-size="17" font-weight="400" fill="#8A8A8A">Hidden-camera scanner for short-term rentals.</text>
  </g>

  <!-- Lens / camera mark on the right -->
  <g transform="translate(1040, 160)">
    <!-- Soft halo -->
    <circle r="104" fill="none" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
    <!-- Outer lens ring -->
    <circle r="72" fill="none" stroke="#FAFAFA" stroke-opacity="0.22" stroke-width="2"/>
    <!-- Iris -->
    <circle r="44" fill="none" stroke="#FAFAFA" stroke-opacity="0.32" stroke-width="1.5"/>
    <!-- Inner pupil ring -->
    <circle r="14" fill="none" stroke="#FAFAFA" stroke-opacity="0.5" stroke-width="1.5"/>
    <!-- Red glow behind active sensor -->
    <circle r="18" fill="url(#pupilGlow)"/>
    <!-- Sensor dot -->
    <circle r="5" fill="#CC1B1B"/>
    <!-- Block slash — single accent, round caps -->
    <line x1="-72" y1="72" x2="72" y2="-72" stroke="#CC1B1B" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Footer rule -->
  <line x1="80" y1="268" x2="1120" y2="268" stroke="#FAFAFA" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Footer mono rail -->
  <g font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, ui-monospace, monospace" font-size="10" font-weight="500" letter-spacing="0.18em" fill="#8A8A8A">
    <text x="80" y="295">GITHUB.COM/CUZETH/AIRBNB-SAFETY-TOOLS</text>
    <text x="1120" y="295" text-anchor="end">MIT &#x00B7; v0.3.0</text>
  </g>
</svg>
